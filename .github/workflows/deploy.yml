name: Deploy to Netlify

  on:
    push:
      branches: [main]

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: 'npm'

        - name: Install dependencies
          run: npm ci

        - name: Deploy to Netlify
          run: npx netlify-cli@latest deploy --build --prod
          env:
            NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
            NETLIFY_SITE_ID: 0220a58f-b761-4a7f-82df-50c5b2be6b71
            NEXT_PUBLIC_SUPABASE_URL: https://mzkhjbukvztgtrdruazv.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_E_ATq6bmGumBMRN6pWP_sw_1Zp0fTqg
